name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Fast gate: unit tests + production web build.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - run: npm run build

  # Compile the Tauri desktop shell so Rust errors surface without cutting a release.
  desktop-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'
      - run: npm ci
      - run: npm run build
      - name: Compile Tauri shell
        working-directory: src-tauri
        run: cargo build

  # Compile the Android APK (unsigned debug) so the Capacitor project + plugins
  # are validated on every push without needing the signing secrets.
  android-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: npm ci
      - run: npm run build
      - run: npx cap sync android
      - name: Write google-services.json (if configured)
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json
            echo "FCM enabled for this build"
          else
            echo "no GOOGLE_SERVICES_JSON secret — building without FCM"
          fi
      - name: Assemble debug APK
        working-directory: android
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          chmod +x gradlew
          ./gradlew assembleDebug
