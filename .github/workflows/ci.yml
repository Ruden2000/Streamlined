name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Fast gate: unit tests + production web build.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - run: npm run build

  # Compile the Tauri desktop shell so Rust errors surface without cutting a release.
  desktop-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'
      - run: npm ci
      - run: npm run build
      - name: Compile Tauri shell
        working-directory: src-tauri
        run: cargo build
