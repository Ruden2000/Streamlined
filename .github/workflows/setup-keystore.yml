name: Generate Android Signing Keystore (run once)

# Run this manually ONE TIME from GitHub → Actions → "Generate Android Signing Keystore"
# Download the artifact, then add the three secrets shown below to your repo.
# Delete this workflow file after you've saved the secrets.

on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: 'Key alias (remember this)'
        required: true
        default: 'streamlined'
      store_password:
        description: 'Keystore password — write it down before running'
        required: true
      key_password:
        description: 'Key password — write it down before running'
        required: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore streamlined.keystore \
            -alias "${{ github.event.inputs.key_alias }}" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Streamlined App, OU=Mobile, O=Streamlined, L=CA, ST=CA, C=US" \
            -storepass "${{ github.event.inputs.store_password }}" \
            -keypass "${{ github.event.inputs.key_password }}"

      - name: Encode keystore to base64
        run: base64 -w 0 streamlined.keystore > keystore.b64

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-keystore
          path: |
            streamlined.keystore
            keystore.b64
          retention-days: 1

      - name: Remind about secrets
        run: |
          echo "=== NEXT STEPS ==="
          echo "1. Download the 'android-keystore' artifact above"
          echo "2. Copy the ENTIRE contents of keystore.b64 into a GitHub Secret named KEYSTORE_BASE64"
          echo "3. Add secret KEY_ALIAS = ${{ github.event.inputs.key_alias }}"
          echo "4. Add secret KEYSTORE_PASS = (the password you entered)"
          echo "5. Add secret KEY_PASS = (the key password you entered)"
          echo "6. Delete this workflow file from your repo"
