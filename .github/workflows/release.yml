name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # ── Tests gate the whole release ────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Verify production build
        run: npm run build

  # ── Create the GitHub Release (only if tests pass) ──────────────────────────
  create-release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          name: Streamlined ${{ github.ref_name }}
          body: |
            ## Streamlined ${{ github.ref_name }}

            ### New in this release
            - **Download notifications** — incoming files show a small dismissible progress box with the filename.
            - **Clearer Transfers panel** — Active transfers up top, files from the last 24 hours below; older items live in the History tab.
            - **Send while offline** — queue files with no device online; they send automatically when one reconnects.
            - **Smarter file names** — optional rename prompt for generic names (image.jpg, IMG_1234…), and duplicates auto-number (image1.jpg, image2.jpg).
            - **Preview before download** — a View button shows images, video, audio, PDFs, and text in-app.
            - **Up to 20 downloadable copies** (size permitting) — raised from 3.
            - **Roll Back picker** — choose any earlier version from a list.

            ### About background running (Windows)
            Closing Streamlined to the system tray **shuts down the main window to free its memory**. A tiny background helper keeps a single connection open purely so it can show you a **native notification with the filename** when a paired device sends a file — it never sees file contents (transfers stay peer-to-peer and encrypted). Click the notification (or the tray icon) to reopen the app. To stop it entirely, right-click the tray icon → **Quit**.

            Phones/PWA receive notifications via the OS even when the app is closed (Web Push on installed iOS 16.4+ / desktop browsers; local notifications on Android).

            ### Install
            **Android** — download **Streamlined.apk** → Settings → allow install from your browser → open the APK → Install.
            **Windows** — download **Streamlined_x64-setup.exe** → if SmartScreen warns, **More info → Run anyway**.
            **iPhone / iPad / Mac** — open **https://streamlined-3bu.pages.dev** in Safari → **Share → Add to Home Screen**.

            ---
            🔒 Files are transferred peer-to-peer with AES-256-GCM encryption. Nothing touches our servers. No account needed.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Website / PWA (Cloudflare Pages) ────────────────────────────────────────
  # Keeps the live PWA in lockstep with each release so it can never go stale.
  # Skips gracefully until the CLOUDFLARE_API_TOKEN secret exists.
  pages:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Deploy website to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 58dfc502551cd9ac7d469edbfee963a1
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "no CLOUDFLARE_API_TOKEN secret — skipping Pages deploy (deploy manually with: npx wrangler pages deploy dist --project-name streamlined)"
            exit 0
          fi
          npx wrangler pages deploy dist --project-name streamlined

  # ── Android APK (Capacitor + Gradle) ────────────────────────────────────────
  android:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Write google-services.json (if configured)
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json
            echo "FCM enabled for this build"
          else
            echo "no GOOGLE_SERVICES_JSON secret — building without FCM"
          fi

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Write android/local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Decode signing keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$GITHUB_WORKSPACE/android/app/streamlined.keystore"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease
        env:
          STORE_FILE: ${{ github.workspace }}/android/app/streamlined.keystore
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASS }}

      - name: Rename APK
        run: mv android/app/build/outputs/apk/release/app-release.apk Streamlined.apk

      - uses: softprops/action-gh-release@v2
        with:
          files: Streamlined.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Windows installer (Tauri v2) ─────────────────────────────────────────────
  windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signs the build and emits latest.json for the in-app updater.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Streamlined ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false
